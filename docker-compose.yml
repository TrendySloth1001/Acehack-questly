services:
  postgres:
    image: postgres:16-alpine
    container_name: questly_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: questly
      POSTGRES_PASSWORD: questly_secret
      POSTGRES_DB: questly_db
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U questly -d questly_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: questly_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  algod:
    image: makerxau/algorand-sandbox-dev:latest
    container_name: questly_algod
    restart: unless-stopped
    ports:
      - "4001:4001"    # algod REST API
      - "4002:4002"    # KMD API
      - "8980:8980"    # Indexer API
    volumes:
      - algod_data:/opt/data

volumes:
  pg_data:
    driver: local
  minio_data:
    driver: local
  algod_data:
    driver: local
